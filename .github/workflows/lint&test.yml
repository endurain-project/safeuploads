name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to avoid wasted
# runner minutes and race conditions on shared resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege: only read access by default.
permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------
  # Lint
  # Runs ruff on all Python sources. Fails fast so test job is only
  # triggered when the code is clean.
  # ----------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint with ruff
        run: uv run ruff check safeuploads tests examples

      - name: Check formatting with ruff
        run: uv run ruff format --check safeuploads tests examples

  # ----------------------------------------------------------------
  # Test
  # Runs the full pytest suite with coverage. Only runs after lint
  # passes so we don't waste runner minutes on broken code.
  # ----------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Audit Python dependencies
        run: uvx pip-audit --require-hashes --disable-pip -r <(uv export --frozen --no-header)

      - name: Run tests with coverage
        run: uv run pytest --cov-fail-under=90

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: safeuploads-coverage
          path: .coverage
          retention-days: 7